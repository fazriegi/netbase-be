services:
  db:
    image: postgres:16-alpine
    container_name: fintrack-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # Persist PostgreSQL data locally
      - postgres_data:/var/lib/postgresql/data
      # Mount the schema file to initialize the DB automatically on creation
      - ./db/migrations/postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack-web
    restart: always
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
    volumes:
      - ./log:/app/log
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
